<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drayton Distributors CRM</title>
<style>
  :root {
    --teal-dark:   #1F5F6B;
    --teal-mid:    #2E7D8C;
    --teal-light:  #D6EEF2;
    --teal-accent: #E8F6F8;
    --gold:        #E8C84A;
    --gold-light:  #FDF3C0;
    --black:       #1A1A1A;
    --dark-gray:   #3D3D3D;
    --mid-gray:    #888888;
    --light-gray:  #EEEEEE;
    --cream:       #FAFAFA;
    --white:       #FFFFFF;
    --success:     #2E7D52;
    --warning:     #C8821A;
    --danger:      #8B2020;
    --font:        'Segoe UI', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── Header ── */
  .app-header {
    background: var(--black);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    color: var(--gold);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .app-header .sub {
    color: var(--mid-gray);
    font-size: 12px;
    margin-left: 12px;
  }
  .header-left { display: flex; align-items: baseline; gap: 8px; }
  .auth-btn {
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 7px 16px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .auth-btn:hover { background: #d4b43e; }
  .user-info { color: var(--mid-gray); font-size: 12px; display: flex; align-items: center; gap: 10px; }
  .sign-out { color: var(--teal-light); font-size: 12px; cursor: pointer; text-decoration: underline; }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Landing ── */
  .landing {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
    padding: 0 24px;
  }
  .landing .logo-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--teal-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }
  .landing h2 { font-size: 26px; color: var(--black); margin-bottom: 8px; }
  .landing p  { color: var(--mid-gray); font-size: 14px; margin-bottom: 32px; }
  .territory-select-wrap { margin-bottom: 20px; }
  .territory-select-wrap label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--dark-gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-align: left;
  }
  select, input[type=text], input[type=date], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #D0D0D0;
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    background: var(--white);
    color: var(--black);
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--teal-mid); }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary   { background: var(--teal-dark); color: var(--white); }
  .btn-secondary { background: var(--light-gray); color: var(--dark-gray); }
  .btn-gold      { background: var(--gold); color: var(--black); }
  .btn-danger    { background: var(--danger); color: var(--white); }
  .btn-success   { background: var(--success); color: var(--white); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* ── Dashboard ── */
  .dashboard { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .territory-bar {
    background: var(--teal-dark);
    color: var(--white);
    padding: 14px 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .territory-bar h2 { font-size: 18px; }
  .territory-bar .stats { display: flex; gap: 24px; }
  .territory-bar .stat { text-align: center; }
  .territory-bar .stat .num { font-size: 22px; font-weight: 700; color: var(--gold); }
  .territory-bar .stat .lbl { font-size: 11px; opacity: 0.8; }

  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--light-gray);
    padding-bottom: 0;
  }
  .tab {
    padding: 10px 20px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 600;
    color: var(--mid-gray);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab.active { color: var(--teal-dark); border-bottom-color: var(--teal-dark); }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: flex-end;
  }
  .search-row .search-wrap { flex: 1; position: relative; }
  .search-row .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--mid-gray);
    font-size: 14px;
  }

  /* Account list */
  .account-list { display: flex; flex-direction: column; gap: 2px; }
  .account-row {
    background: var(--white);
    border: 1px solid var(--light-gray);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .account-row:hover { border-color: var(--teal-mid); box-shadow: 0 2px 8px rgba(31,95,107,0.1); }
  .account-row .name { font-weight: 600; font-size: 14px; }
  .account-row .meta { font-size: 12px; color: var(--mid-gray); margin-top: 2px; }
  .account-row .right { display: flex; align-items: center; gap: 10px; }
  .rating-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--teal-light);
    color: var(--teal-dark);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .rating-badge.r5 { background: #1F5F6B; color: white; }
  .rating-badge.r4 { background: #2E7D8C; color: white; }
  .rating-badge.r3 { background: #D6EEF2; color: #1F5F6B; }
  .rating-badge.r2 { background: var(--light-gray); color: var(--mid-gray); }
  .status-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .pill-prospect { background: var(--gold-light); color: #8a6200; }
  .pill-active   { background: #D4EDDA; color: #1a5c2e; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--mid-gray);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Account Detail ── */
  .account-detail { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .detail-header {
    background: var(--teal-dark);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .detail-header h2 { color: var(--white); font-size: 22px; margin-bottom: 4px; }
  .detail-header .meta { color: var(--teal-light); font-size: 13px; }
  .detail-header .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

  .back-btn {
    background: none;
    border: none;
    color: var(--teal-mid);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 12px;
    padding: 0;
  }
  .back-btn:hover { color: var(--teal-dark); }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 640px) {
    .cards-grid { grid-template-columns: 1fr; }
    .detail-header { flex-direction: column; gap: 12px; }
    .territory-bar .stats { gap: 12px; }
  }

  .card {
    background: var(--white);
    border: 1px solid var(--light-gray);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-header {
    background: var(--teal-dark);
    color: var(--white);
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-body { padding: 14px 16px; }
  .field-row {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--light-gray);
    font-size: 13px;
    align-items: flex-start;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    width: 130px;
    flex-shrink: 0;
    color: var(--mid-gray);
    font-size: 12px;
    padding-top: 1px;
  }
  .field-value { flex: 1; color: var(--black); word-break: break-word; }
  .field-value.empty { color: var(--light-gray); font-style: italic; }

  /* BG Products grid */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
  }
  .product-chip {
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .product-chip.yes  { background: #D4EDDA; color: #1a5c2e; }
  .product-chip.no   { background: var(--light-gray); color: var(--mid-gray); }

  /* Visit log */
  .visit-card {
    background: var(--white);
    border: 1px solid var(--light-gray);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .visit-card-header {
    background: var(--teal-dark);
    color: var(--white);
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .visit-entry {
    padding: 12px 16px;
    border-bottom: 1px solid var(--light-gray);
    font-size: 13px;
  }
  .visit-entry:last-child { border-bottom: none; }
  .visit-entry .visit-date { font-weight: 700; color: var(--teal-dark); margin-bottom: 4px; font-size: 12px; }
  .visit-entry .visit-notes { color: var(--dark-gray); line-height: 1.5; }
  .visit-entry .visit-followup { margin-top: 6px; font-size: 12px; color: var(--mid-gray); }
  .expand-btn {
    background: var(--teal-accent);
    border: 1px solid var(--teal-light);
    color: var(--teal-dark);
    width: 100%;
    padding: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 0 0 8px 8px;
    text-align: center;
  }

  /* ── Modals ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 10px;
    width: 100%;
    max-width: 560px;
    overflow: hidden;
    margin: auto;
  }
  .modal-header {
    background: var(--teal-dark);
    color: var(--white);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 16px; }
  .modal-close {
    background: none;
    border: none;
    color: var(--white);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--light-gray);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .form-section {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--light-gray);
  }
  .form-section:last-child { border-bottom: none; margin-bottom: 0; }
  .form-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--teal-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--dark-gray);
    margin-bottom: 4px;
  }
  .form-row textarea { min-height: 80px; resize: vertical; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .rating-input { display: flex; gap: 6px; }
  .rating-opt {
    flex: 1;
    padding: 8px 4px;
    border: 2px solid var(--light-gray);
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.15s;
  }
  .rating-opt:hover, .rating-opt.selected { border-color: var(--teal-dark); background: var(--teal-accent); color: var(--teal-dark); }

  .products-check-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .product-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid var(--light-gray);
  }
  .product-check:hover { background: var(--teal-accent); border-color: var(--teal-light); }
  .product-check input { accent-color: var(--teal-dark); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--teal-dark);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); }

  .loading {
    text-align: center;
    padding: 48px;
    color: var(--mid-gray);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--light-gray);
    border-top-color: var(--teal-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .convert-banner {
    background: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <div class="header-left">
    <h1>Drayton Distributors</h1>
    <span class="sub">CRM</span>
  </div>
  <div id="authArea">
    <button class="auth-btn" onclick="signIn()">Sign in with Google</button>
  </div>
</header>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- ── Screen: Landing ── -->
<div class="screen active" id="screenLanding">
  <div class="landing">
    <div class="logo-ring">🔧</div>
    <h2>Drayton CRM</h2>
    <p>Sign in with your Google account to access your territory dashboard.</p>
    <button class="btn btn-primary btn-full" onclick="signIn()">Sign in with Google</button>
  </div>
</div>

<!-- ── Screen: Territory Select ── -->
<div class="screen" id="screenTerritory">
  <div class="landing">
    <div class="logo-ring">📍</div>
    <h2>Select Territory</h2>
    <p>Choose your route to load your accounts.</p>
    <div class="territory-select-wrap">
      <label>Territory</label>
      <select id="territorySelect">
        <option value="">-- Select a route --</option>
        <option value="Route 101">Route 101</option>
        <option value="Route 102">Route 102</option>
        <option value="Route 105">Route 105</option>
        <option value="Route 111">Route 111</option>
        <option value="Route 112">Route 112</option>
        <option value="Route 135">Route 135</option>
        <option value="Route 137">Route 137</option>
        <option value="Route 141">Route 141</option>
        <option value="Route 143">Route 143</option>
        <option value="Route 147">Route 147</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="loadTerritory()">Load Territory</button>
  </div>
</div>

<!-- ── Screen: Dashboard ── -->
<div class="screen" id="screenDashboard">
  <div class="dashboard">
    <div class="territory-bar">
      <div>
        <h2 id="dashTerritoryName">Route 105</h2>
        <div style="color:var(--teal-light);font-size:12px;margin-top:2px;">Rhode Island Territory</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="num" id="statActive">—</div><div class="lbl">Active</div></div>
        <div class="stat"><div class="num" id="statProspect">—</div><div class="lbl">Prospects</div></div>
        <div class="stat"><div class="num" id="statHot">—</div><div class="lbl">Hot (4-5★)</div></div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab active" id="tabProspect" onclick="switchTab('prospect')">🔍 Prospective</button>
      <button class="tab" id="tabActive" onclick="switchTab('active')">✅ Active Clients</button>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search accounts..." oninput="renderList()">
      </div>
      <button class="btn btn-gold" onclick="openNewAccount()">＋ New Account</button>
    </div>

    <div id="accountList" class="account-list">
      <div class="loading"><div class="spinner"></div>Loading accounts...</div>
    </div>
  </div>
</div>

<!-- ── Screen: Account Detail ── -->
<div class="screen" id="screenDetail">
  <div class="account-detail">
    <button class="back-btn" onclick="goBack()">← Back to dashboard</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ── Modal: Edit Account ── -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal">
    <div class="modal-header">
      <h3 id="editModalTitle">Edit Account</h3>
      <button class="modal-close" onclick="closeModal('modalEdit')">✕</button>
    </div>
    <div class="modal-body" id="editModalBody" style="max-height:70vh;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalEdit')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAccount()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── Modal: Log Visit ── -->
<div class="modal-overlay" id="modalVisit">
  <div class="modal">
    <div class="modal-header">
      <h3>Log a Visit</h3>
      <button class="modal-close" onclick="closeModal('modalVisit')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Visit Date</label>
        <input type="date" id="visitDate">
      </div>
      <div class="form-row">
        <label>Attendees</label>
        <input type="text" id="visitAttendees" placeholder="Who was present?">
      </div>
      <div class="form-row">
        <label>Visit Notes</label>
        <textarea id="visitNotes" placeholder="What was discussed? Key takeaways..."></textarea>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label>Follow-Up Date</label>
          <input type="date" id="visitFollowup">
        </div>
        <div class="form-row">
          <label>Follow-Up Notes</label>
          <input type="text" id="visitFollowupNotes" placeholder="Action items...">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalVisit')">Cancel</button>
      <button class="btn btn-primary" onclick="saveVisit()">Log Visit</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CLIENT_ID    = '237629763930-6q7ue607d2u1ka1ortgmlg9on0jhikss.apps.googleusercontent.com';
const SHEET_ID     = '1juYkIPEVznsWV8J-ivcs60yU5NsrL4xXmx4C2AtctHA';
const SCOPES       = 'https://www.googleapis.com/auth/spreadsheets';
const DISCOVERY    = 'https://sheets.googleapis.com/$discovery/rest?version=v4';

const BG_PRODUCTS = [
  {key:'bg_transmission',label:'Transmission'},
  {key:'bg_coolant',     label:'Coolant'},
  {key:'bg_diff',        label:'Diff'},
  {key:'bg_induction',   label:'Induction'},
  {key:'bg_injection',   label:'Injection'},
  {key:'bg_gdi',         label:'GDI'},
  {key:'bg_brake',       label:'Brake'},
  {key:'bg_ac',          label:'AC'},
  {key:'bg_moa_efl',     label:'MOA / EFL'},
  {key:'bg_epr',         label:'EPR'},
  {key:'bg_battery',     label:'Battery'},
  {key:'bg_fuel',        label:'Fuel Pour-in'},
  {key:'bg_diesel',      label:'Diesel'},
  {key:'bg_misc',        label:'Misc'},
];

// Column index map (0-based) matching our sheet headers
const COL = {
  account_id:0, territory:1, status:2, business_name:3,
  address:4, town:5, state:6, website:7,
  bays:8, advisors:9, monthly_ro:10, door_rate:11, maint_rate:12,
  competitor_product:13, competitor_name:14,
  sm_name:15, sm_phone:16, sm_email:17,
  owner_name:18, owner_phone:19, owner_email:20,
  other1_role:21, other1_name:22, other1_phone:23, other1_email:24,
  other2_role:25, other2_name:26, other2_phone:27, other2_email:28,
  rating:29,
  bg_transmission:30, bg_coolant:31, bg_diff:32, bg_induction:33,
  bg_injection:34, bg_gdi:35, bg_brake:36, bg_ac:37, bg_moa_efl:38,
  bg_epr:39, bg_battery:40, bg_fuel:41, bg_diesel:42, bg_misc:43,
  products_offered:44, general_notes:45, interested:46,
  last_visit:47, next_followup:48
};
const VISIT_COL = {
  visit_id:0, account_id:1, account_name:2, territory:3,
  visit_date:4, attendees:5, notes:6, followup_date:7, followup_notes:8
};

// ── State ────────────────────────────────────────────────────────────────────
let gapiReady = false, gisReady = false, tokenClient;
let allAccounts = [], allVisits = [];
let currentTerritory = '', currentTab = 'prospect', currentAccount = null;

// ── Auth ─────────────────────────────────────────────────────────────────────
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: [DISCOVERY] });
    gapiReady = true;
    maybeReady();
  });
}
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('Sign-in failed', true); return; }
      showScreen('screenTerritory');
      document.getElementById('authArea').innerHTML =
        `<div class="user-info"><span id="userEmail"></span><span class="sign-out" onclick="signOut()">Sign out</span></div>`;
    }
  });
  gisReady = true;
  maybeReady();
}
function maybeReady() {
  if (gapiReady && gisReady) {
    const token = gapi.client.getToken();
    if (token) showScreen('screenTerritory');
  }
}
function signIn() { tokenClient.requestAccessToken({ prompt: '' }); }
function signOut() {
  google.accounts.oauth2.revoke(gapi.client.getToken().access_token);
  gapi.client.setToken(null);
  allAccounts = []; allVisits = [];
  showScreen('screenLanding');
  document.getElementById('authArea').innerHTML = `<button class="auth-btn" onclick="signIn()">Sign in with Google</button>`;
}

// ── Screen nav ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack() { showScreen('screenDashboard'); renderList(); }

// ── Load territory ───────────────────────────────────────────────────────────
async function loadTerritory() {
  const sel = document.getElementById('territorySelect').value;
  if (!sel) { showToast('Please select a territory', true); return; }
  currentTerritory = sel;
  showScreen('screenDashboard');
  document.getElementById('dashTerritoryName').textContent = sel;
  document.getElementById('accountList').innerHTML = '<div class="loading"><div class="spinner"></div>Loading accounts...</div>';
  await fetchSheetData();
  updateStats();
  renderList();
}

async function fetchSheetData() {
  try {
    const [accResp, visResp] = await Promise.all([
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SHEET_ID, range: 'Accounts!A2:AW' }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SHEET_ID, range: 'Visits!A2:I' }),
    ]);
    const accRows = accResp.result.values || [];
    allAccounts = accRows
      .filter(r => r[COL.territory] === currentTerritory)
      .map(r => rowToAccount(r));
    const visRows = visResp.result.values || [];
    allVisits = visRows
      .filter(r => r[VISIT_COL.territory] === currentTerritory)
      .map(r => ({
        visit_id:       r[VISIT_COL.visit_id]       || '',
        account_id:     r[VISIT_COL.account_id]     || '',
        account_name:   r[VISIT_COL.account_name]   || '',
        visit_date:     r[VISIT_COL.visit_date]      || '',
        attendees:      r[VISIT_COL.attendees]       || '',
        notes:          r[VISIT_COL.notes]            || '',
        followup_date:  r[VISIT_COL.followup_date]   || '',
        followup_notes: r[VISIT_COL.followup_notes]  || '',
      }));
  } catch(e) {
    showToast('Error loading data — check sheet permissions', true);
    console.error(e);
  }
}

function rowToAccount(r) {
  const obj = {};
  Object.entries(COL).forEach(([k,i]) => obj[k] = r[i] || '');
  return obj;
}

function updateStats() {
  const active   = allAccounts.filter(a => a.status === 'active').length;
  const prospect = allAccounts.filter(a => a.status === 'prospect').length;
  const hot      = allAccounts.filter(a => parseInt(a.rating) >= 4).length;
  document.getElementById('statActive').textContent   = active;
  document.getElementById('statProspect').textContent = prospect;
  document.getElementById('statHot').textContent      = hot;
}

// ── List rendering ───────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabProspect').classList.toggle('active', tab === 'prospect');
  document.getElementById('tabActive').classList.toggle('active',   tab === 'active');
  renderList();
}

function renderList() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allAccounts.filter(a => {
    if (a.status !== currentTab) return false;
    if (!query) return true;
    return a.business_name.toLowerCase().includes(query) ||
           a.town.toLowerCase().includes(query) ||
           a.owner_name.toLowerCase().includes(query);
  });

  if (filtered.length === 0) {
    document.getElementById('accountList').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <div>${query ? 'No accounts match your search.' : 'No accounts in this category yet.'}</div>
      </div>`;
    return;
  }

  // Sort: by rating desc, then name asc
  filtered.sort((a,b) => {
    const ra = parseInt(a.rating) || 0, rb = parseInt(b.rating) || 0;
    if (rb !== ra) return rb - ra;
    return a.business_name.localeCompare(b.business_name);
  });

  document.getElementById('accountList').innerHTML = filtered.map(a => {
    const r = parseInt(a.rating) || 0;
    const rClass = r >= 5 ? 'r5' : r >= 4 ? 'r4' : r >= 3 ? 'r3' : r >= 2 ? 'r2' : '';
    const rLabel = r ? r : '—';
    return `<div class="account-row" onclick="openAccount('${a.account_id}')">
      <div>
        <div class="name">${a.business_name}</div>
        <div class="meta">${[a.town, a.state].filter(Boolean).join(', ')}${a.owner_name ? ' · ' + a.owner_name : ''}</div>
      </div>
      <div class="right">
        <span class="status-pill ${a.status === 'active' ? 'pill-active' : 'pill-prospect'}">${a.status}</span>
        <div class="rating-badge ${rClass}" title="Rating: ${rLabel}">${rLabel}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Account detail ───────────────────────────────────────────────────────────

  currentAccount = allAccounts.find(a => a.account_id === accId);
  if (!currentAccount) return;
  renderDetail();
  showScreen('screenDetail');
}

function toggleVisits() {
  const el  = document.getElementById('moreVisits');
  const btn = document.getElementById('expandBtn');
  const showing = el.style.display !== 'none';
  el.style.display  = showing ? 'none' : 'block';
  btn.textContent   = showing ? `Show more visits` : 'Show fewer visits';
}

// ── Convert to Active ────────────────────────────────────────────────────────
async function convertToActive() {
  if (!confirm(`Convert ${currentAccount.business_name} to an Active Client?`)) return;
  const rowIdx = getAccountRowIndex(currentAccount.account_id);
  if (rowIdx < 0) { showToast('Could not find account row', true); return; }
  try {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEET_ID,
      range: `Accounts!C${rowIdx + 2}`,
      valueInputOption: 'RAW',
      resource: { values: [['active']] }
    });
    currentAccount.status = 'active';
    showToast(`${currentAccount.business_name} is now an Active Client ✅`);
    updateStats();
    renderDetail();
  } catch(e) { showToast('Error updating status', true); console.error(e); }
}

let selectedRating = null;
function selectRating(n) {
  selectedRating = n;
  document.querySelectorAll('.rating-opt').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.val) === n);
  });
}

async function saveAccount() {
  const a = currentAccount;
  const fields = ['business_name','address','town','state','website','bays','advisors',
    'monthly_ro','door_rate','maint_rate','competitor_product','competitor_name',
    'sm_name','sm_phone','sm_email','owner_name','owner_phone','owner_email',
    'other1_role','other1_name','other1_phone','other1_email',
    'other2_role','other2_name','other2_phone','other2_email','general_notes'];

  fields.forEach(f => {
    const el = document.getElementById('e_' + f);
    if (el) a[f] = el.value;
  });
  if (selectedRating !== null) a.rating = String(selectedRating);
  BG_PRODUCTS.forEach(p => {
    const el = document.getElementById('e_' + p.key);
    if (el) a[p.key] = el.checked ? 'Yes' : '';
  });

  const rowIdx = getAccountRowIndex(a.account_id);
  if (rowIdx < 0) { showToast('Could not find row', true); return; }

  const rowValues = Object.keys(COL).map(k => a[k] || '');
  try {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEET_ID,
      range: `Accounts!A${rowIdx + 2}`,
      valueInputOption: 'RAW',
      resource: { values: [rowValues] }
    });
    showToast('Account saved ✓');
    closeModal('modalEdit');
    selectedRating = null;
    renderDetail();
  } catch(e) { showToast('Error saving', true); console.error(e); }
}

// ── Visit modal ──────────────────────────────────────────────────────────────
function openVisitModal() {
  document.getElementById('visitDate').value         = new Date().toISOString().split('T')[0];
  document.getElementById('visitAttendees').value    = '';
  document.getElementById('visitNotes').value        = '';
  document.getElementById('visitFollowup').value     = '';
  document.getElementById('visitFollowupNotes').value= '';
  document.getElementById('modalVisit').classList.add('open');
}

async function saveVisit() {
  const a = currentAccount;
  const date    = document.getElementById('visitDate').value;
  const attend  = document.getElementById('visitAttendees').value;
  const notes   = document.getElementById('visitNotes').value;
  const fu      = document.getElementById('visitFollowup').value;
  const fuNotes = document.getElementById('visitFollowupNotes').value;
  if (!notes) { showToast('Please add visit notes', true); return; }

  const visitId = `VIS${Date.now()}`;
  const newRow  = [visitId, a.account_id, a.business_name, currentTerritory, date, attend, notes, fu, fuNotes];

  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SHEET_ID,
      range: 'Visits!A:I',
      valueInputOption: 'RAW',
      resource: { values: [newRow] }
    });
    // Update last_visit on account
    const rowIdx = getAccountRowIndex(a.account_id);
    if (rowIdx >= 0) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `Accounts!AV${rowIdx + 2}`,
        valueInputOption: 'RAW',
        resource: { values: [[date]] }
      });
      a.last_visit = date;
    }
    allVisits.push({ visit_id:visitId, account_id:a.account_id, account_name:a.business_name,
      visit_date:date, attendees:attend, notes, followup_date:fu, followup_notes:fuNotes });
    showToast('Visit logged ✓');
    closeModal('modalVisit');
    renderDetail();
  } catch(e) { showToast('Error saving visit', true); console.error(e); }
}

// ── New Account ──────────────────────────────────────────────────────────────
function openNewAccount() {
  currentAccount = Object.fromEntries(Object.keys(COL).map(k => [k, '']));
  currentAccount.territory = currentTerritory;
  currentAccount.status    = currentTab;
  currentAccount.state     = 'RI';
  currentAccount.account_id = `ACC${Date.now()}`;
  document.getElementById('editModalTitle').textContent = 'Add New Account';
  openEditModal();
  // Override save to append instead of update
  document.querySelector('#modalEdit .modal-footer .btn-primary').onclick = saveNewAccount;
}

async function saveNewAccount() {
  const a = currentAccount;
  const fields = ['business_name','address','town','state','website','bays','advisors',
    'monthly_ro','door_rate','maint_rate','competitor_product','competitor_name',
    'sm_name','sm_phone','sm_email','owner_name','owner_phone','owner_email',
    'other1_role','other1_name','other1_phone','other1_email',
    'other2_role','other2_name','other2_phone','other2_email','general_notes'];
  fields.forEach(f => { const el = document.getElementById('e_'+f); if(el) a[f]=el.value; });
  if (selectedRating !== null) a.rating = String(selectedRating);
  BG_PRODUCTS.forEach(p => { const el = document.getElementById('e_'+p.key); if(el) a[p.key] = el.checked?'Yes':''; });

  const rowValues = Object.keys(COL).map(k => a[k] || '');
  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SHEET_ID,
      range: 'Accounts!A:AW',
      valueInputOption: 'RAW',
      resource: { values: [rowValues] }
    });
    allAccounts.push(a);
    showToast('Account added ✓');
    closeModal('modalEdit');
    selectedRating = null;
    updateStats();
    renderList();
    // Reset save button
    document.querySelector('#modalEdit .modal-footer .btn-primary').onclick = saveAccount;
  } catch(e) { showToast('Error adding account', true); console.error(e); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function getAccountRowIndex(accId) {
  // Needs to find the row in the full sheet — we store a local index map
  return allAccounts.findIndex(a => a.account_id === accId);
}

async function getSheetRowNumber(accId) {
  // Fetch actual row number from sheet for writes
  try {
    const resp = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SHEET_ID, range: 'Accounts!A:A'
    });
    const ids = (resp.result.values || []).map(r => r[0]);
    return ids.indexOf(accId); // 0-based, +2 for header and 1-index
  } catch(e) { return -1; }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openNewAccount() {
  currentAccount = Object.fromEntries(Object.keys(COL).map(k=>[k,'']));
  currentAccount.territory  = currentTerritory;
  currentAccount.status     = currentTab;
  currentAccount.state      = 'RI';
  currentAccount.account_id = `ACC${Date.now()}`;
  document.getElementById('editModalTitle').textContent = 'Add New Account';
  openEditModal();
  document.querySelector('#modalEdit .modal-footer .btn-primary').onclick = saveNewAccount;
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast', 3000);
}

// Fix getAccountRowIndex to work with sheet row numbers for writes
// We override saveAccount to look up actual sheet row
const _saveAccount = saveAccount;
async function saveAccount() {
  const a   = currentAccount;
  const idx = await getSheetRowNumber(a.account_id);
  if (idx < 0) { showToast('Could not find account row', true); return; }

  const fields = ['business_name','address','town','state','website','bays','advisors',
    'monthly_ro','door_rate','maint_rate','competitor_product','competitor_name',
    'sm_name','sm_phone','sm_email','owner_name','owner_phone','owner_email',
    'other1_role','other1_name','other1_phone','other1_email',
    'other2_role','other2_name','other2_phone','other2_email','general_notes'];
  fields.forEach(f => { const el = document.getElementById('e_'+f); if(el) a[f]=el.value; });
  if (selectedRating !== null) a.rating = String(selectedRating);
  BG_PRODUCTS.forEach(p => { const el = document.getElementById('e_'+p.key); if(el) a[p.key]=el.checked?'Yes':''; });

  const rowValues = Object.keys(COL).map(k => a[k]||'');
  try {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEET_ID,
      range: `Accounts!A${idx + 1}`,
      valueInputOption: 'RAW',
      resource: { values: [rowValues] }
    });
    showToast('Account saved ✓');
    closeModal('modalEdit');
    selectedRating = null;
    renderDetail();
  } catch(e) { showToast('Error saving', true); console.error(e); }
}

async function convertToActive() {
  if (!confirm(`Convert ${currentAccount.business_name} to an Active Client?`)) return;
  const idx = await getSheetRowNumber(currentAccount.account_id);
  if (idx < 0) { showToast('Could not find account row', true); return; }
  try {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEET_ID,
      range: `Accounts!C${idx + 1}`,
      valueInputOption: 'RAW',
      resource: { values: [['active']] }
    });
    currentAccount.status = 'active';
    showToast(`${currentAccount.business_name} converted to Active ✅`);
    updateStats();
    renderDetail();
  } catch(e) { showToast('Error updating status', true); console.error(e); }
}
